---
apiVersion: v1
kind: Namespace
metadata:
  name: demo
---
# A service account with NO permissions — the starting point for the RBAC demo
apiVersion: v1
kind: ServiceAccount
metadata:
  name: demo-user
  namespace: demo
---
# A simple pod to prove the cluster is working
apiVersion: v1
kind: Pod
metadata:
  name: web
  namespace: demo
  labels:
    app: web
spec:
  containers:
    - name: nginx
      image: nginx:alpine
      ports:
        - containerPort: 80
