command:
  can-i-get-pods:
    exec: "kubectl --kubeconfig $KUBECONFIG_RBAC auth can-i get pods --as=system:serviceaccount:demo:demo-user -n demo"
    exit-status: 0
    timeout: 5000
  can-i-create-pods:
    exec: "kubectl --kubeconfig $KUBECONFIG_RBAC auth can-i create pods --as=system:serviceaccount:demo:demo-user -n demo"
    exit-status: 0
    timeout: 5000
  can-i-delete-pods:
    exec: "kubectl --kubeconfig $KUBECONFIG_RBAC auth can-i delete pods --as=system:serviceaccount:demo:demo-user -n demo"
    exit-status: 0
    timeout: 5000
  can-i-get-roles:
