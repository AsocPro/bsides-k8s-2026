    exit-status: 0
    timeout: 5000
  can-i-delete-roles:
    exec: "kubectl --kubeconfig $KUBECONFIG_RBAC auth can-i delete roles --as=system:serviceaccount:demo:demo-user -n demo"
    exit-status: 0
    timeout: 5000
  can-i-get-rolebindings:
    exec: "kubectl --kubeconfig $KUBECONFIG_RBAC auth can-i get rolebindings --as=system:serviceaccount:demo:demo-user -n demo"
    exit-status: 0
