server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;

  # Serve the Svelte SPA
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Demo slides embed ttyd iframes at /terminal/{name}/. In capture mode we
  # aren't running real terminals, so return a styled placeholder that fills
  # the iframe cleanly in the PDF output.
  location /terminal/ {
    default_type text/html;
    return 200 '<!doctype html><html><head><style>html,body{margin:0;height:100%;background:#1a1a2e;color:#6b7280;font-family:ui-monospace,Menlo,monospace;display:flex;align-items:center;justify-content:center;padding:1.5rem;text-align:center}</style></head><body><div>Live terminal &mdash; see README for how to run the full demo locally.</div></body></html>';
  }

  # The state-check API won't exist in capture mode — avoid log spam.
  location /api/ {
    return 204;
  }
}
